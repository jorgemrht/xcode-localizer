interface:
  display_name: "Xcode Localizer"
  short_description: "Xcode 26 String Catalog localization — no UI edits"
  default_prompt: "Use $xcode-localizer to add or update localization keys in Translations/Localizable.xcstrings, Translations/AppStrings.swift, Translations/xcode-localizer.config.json, and Translations/reports/*.html. Do not read or modify app source, SwiftUI views, or Xcode project files."
  brand_color: "#F05138"

policy:
  allow_implicit_invocation: true
